spring.application.name=fraud-detection
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fraud_detection}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:934625}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.admin.fail-fast=false
spring.kafka.consumer.group-id=fraud-detection-service
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

app.security.jwt-secret=${JWT_SECRET:change-this-development-secret-to-a-long-random-value}
app.security.jwt-ttl-seconds=${JWT_TTL_SECONDS:900}
app.security.refresh-token-ttl-seconds=${REFRESH_TOKEN_TTL_SECONDS:604800}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://172.21.4.55:*,https://*.ngrok-free.dev,https://*.ngrok-free.app,https://*.ngrok.io}
app.ml-service.enabled=${ML_SERVICE_ENABLED:true}
app.ml-service.url=${ML_SERVICE_URL:http://localhost:8000}
app.ml-service.connect-timeout-ms=${ML_SERVICE_CONNECT_TIMEOUT_MS:2000}
app.ml-service.read-timeout-ms=${ML_SERVICE_READ_TIMEOUT_MS:5000}
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@securebank.local}
app.reports.daily-summary-cron=${DAILY_SUMMARY_CRON:0 0 8 * * *}
app.reports.time-zone=${REPORT_TIME_ZONE:Asia/Kolkata}
app.kafka.enabled=${KAFKA_ENABLED:false}
app.kafka.topics.transactions=transactions.created
app.kafka.topics.fraud=fraud.detected
app.bootstrap.super-admin.username=${SUPER_ADMIN_USERNAME:superadmin}
app.bootstrap.super-admin.email=${SUPER_ADMIN_EMAIL:superadmin@bank.local}
app.bootstrap.super-admin.password=${SUPER_ADMIN_PASSWORD:SuperAdmin@123}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.health.mail.enabled=false

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
